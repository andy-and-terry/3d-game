<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Worlds — 3D Game</title>
  <link rel="stylesheet" href="worlds_settings.css" />
  <style>
    /* ------------------------------------------------------------------ */
    /*  Reset & base                                                        */
    /* ------------------------------------------------------------------ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #0d0f1a;
      color: #dde3f5;
      font-family: 'Segoe UI', system-ui, Arial, sans-serif;
      font-size: 14px;
    }

    /* ------------------------------------------------------------------ */
    /*  Layout                                                              */
    /* ------------------------------------------------------------------ */
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    header h1 {
      font-size: 20px;
      font-weight: 600;
      color: #a8b8ff;
      letter-spacing: 0.5px;
    }
    header .subtitle { font-size: 12px; color: #666; margin-top: 2px; }

    /* Toolbar */
    #toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 10px 20px;
      background: rgba(255,255,255,0.02);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    /* World list */
    #world-list-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
    }
    #world-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 14px;
    }

    /* World card */
    .world-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
      position: relative;
    }
    .world-card:hover {
      border-color: rgba(120,150,255,0.6);
      background: rgba(255,255,255,0.08);
      transform: translateY(-2px);
    }
    .world-card.selected {
      border-color: #6680ff;
      background: rgba(80,100,255,0.12);
    }
    .world-thumb {
      width: 100%;
      height: 110px;
      background: linear-gradient(135deg, #1a2a1a 0%, #0a1a2a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      user-select: none;
    }
    .world-info { padding: 10px 12px 12px; }
    .world-name {
      font-size: 15px;
      font-weight: 600;
      color: #c8d4ff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .world-meta {
      margin-top: 4px;
      font-size: 11px;
      color: #778;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    /* Action bar at bottom of card (shown on hover/selected) */
    .world-actions {
      display: flex;
      gap: 4px;
      padding: 8px 12px;
      border-top: 1px solid rgba(255,255,255,0.06);
      background: rgba(0,0,0,0.2);
    }
    .world-actions .btn-icon {
      flex: 1;
      padding: 5px;
      font-size: 11px;
      text-align: center;
      border-radius: 5px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: background 0.15s;
      color: #aabf;
      background: transparent;
    }
    .world-actions .btn-icon:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .world-actions .btn-icon.play  { color: #6f9; border-color: rgba(80,200,100,0.3); }
    .world-actions .btn-icon.play:hover { background: rgba(80,200,80,0.15); }
    .world-actions .btn-icon.del   { color: #f88; }
    .world-actions .btn-icon.del:hover { background: rgba(200,60,60,0.2); }

    /* Empty state */
    #empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #445;
    }
    #empty-state .icon { font-size: 56px; margin-bottom: 16px; }
    #empty-state p { font-size: 15px; margin-bottom: 8px; color: #778; }

    /* Status bar */
    #statusbar {
      padding: 6px 20px;
      border-top: 1px solid rgba(255,255,255,0.06);
      font-size: 11px;
      color: #556;
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
    }
    #status-msg { transition: color 0.3s; }
    #status-msg.ok    { color: #6c8; }
    #status-msg.error { color: #f88; }

    /* ------------------------------------------------------------------ */
    /*  Buttons                                                             */
    /* ------------------------------------------------------------------ */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 7px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.07);
      color: #ccd;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .btn:hover { background: rgba(255,255,255,0.13); color: #fff; }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .btn.primary {
      background: rgba(80,100,255,0.25);
      border-color: rgba(100,130,255,0.5);
      color: #a8c0ff;
    }
    .btn.primary:hover { background: rgba(80,100,255,0.4); color: #d0ddff; }
    .btn.danger {
      background: rgba(200,50,50,0.2);
      border-color: rgba(200,80,80,0.4);
      color: #f8a8a8;
    }
    .btn.danger:hover { background: rgba(200,50,50,0.35); }

    /* ------------------------------------------------------------------ */
    /*  Modals                                                              */
    /* ------------------------------------------------------------------ */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.65);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    .modal-backdrop.hidden { display: none; }
    .modal {
      background: #141622;
      border: 1px solid rgba(120,140,255,0.25);
      border-radius: 12px;
      padding: 24px;
      width: 420px;
      max-width: 95vw;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }
    .modal h2 {
      font-size: 17px;
      color: #a8b8ff;
      margin-bottom: 18px;
    }
    .modal label {
      display: block;
      font-size: 12px;
      color: #778;
      margin-bottom: 4px;
      margin-top: 14px;
    }
    .modal label:first-of-type { margin-top: 0; }
    .modal input[type="text"],
    .modal input[type="number"] {
      width: 100%;
      padding: 8px 10px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      color: #dde;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .modal input:focus { border-color: rgba(100,130,255,0.6); }
    .seed-row {
      display: flex; gap: 8px; align-items: center;
    }
    .seed-row input { flex: 1; }
    .modal-footer {
      display: flex; justify-content: flex-end; gap: 8px; margin-top: 22px;
    }

    /* Settings modal - wider */
    #modal-settings .modal { width: 520px; }
    .settings-section { margin-top: 20px; }
    .settings-section h3 {
      font-size: 13px;
      font-weight: 600;
      color: #7890cc;
      margin-bottom: 10px;
      padding-bottom: 5px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .setting-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .setting-row:last-child { border-bottom: none; }
    .setting-row label { color: #aab; font-size: 13px; margin: 0; }
    .setting-row input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }
    .setting-row input[type="range"] { width: 120px; }
    .addon-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px;
      background: rgba(255,255,255,0.04);
      border-radius: 6px;
      margin-bottom: 6px;
    }
    .addon-row .addon-name { font-size: 13px; color: #bbc; }
    .addon-row .addon-meta { font-size: 11px; color: #556; }
    .no-addons { color: #445; font-size: 12px; padding: 10px 0; }

    /* File input helper */
    #file-import-input { display: none; }
  </style>
</head>
<body>
<div id="app">

  <!-- ==================== HEADER ==================== -->
  <header>
    <div>
      <h1>🌍 Worlds</h1>
      <div class="subtitle" id="world-count">Loading…</div>
    </div>
    <button class="btn" id="btn-refresh" title="Refresh list">↻ Refresh</button>
  </header>

  <!-- ==================== TOOLBAR ==================== -->
  <div id="toolbar">
    <button class="btn primary" id="btn-new">＋ New World</button>
    <button class="btn" id="btn-import">⬆ Import .world</button>
    <button class="btn" id="btn-export" disabled>⬇ Export</button>
    <button class="btn" id="btn-duplicate" disabled>⧉ Duplicate</button>
    <button class="btn" id="btn-rename" disabled>✏ Rename</button>
    <button class="btn" id="btn-settings" disabled>⚙ Settings</button>
    <button class="btn danger" id="btn-delete" disabled>🗑 Delete</button>
  </div>

  <!-- ==================== WORLD LIST ==================== -->
  <div id="world-list-container">
    <div id="world-list"></div>
    <div id="empty-state" class="hidden">
      <div class="icon">🌐</div>
      <p>No worlds yet.</p>
      <p>Click <strong>New World</strong> to create your first world.</p>
    </div>
  </div>

  <!-- ==================== STATUS BAR ==================== -->
  <div id="statusbar">
    <span id="status-msg">Ready</span>
    <span id="status-version">3D Game — Phase 1</span>
  </div>
</div>

<!-- ========================================================== -->
<!--  MODAL: New World                                           -->
<!-- ========================================================== -->
<div class="modal-backdrop hidden" id="modal-new">
  <div class="modal">
    <h2>✨ Create New World</h2>

    <label for="new-world-name">World Name</label>
    <input type="text" id="new-world-name" placeholder="My Awesome World" maxlength="64" />

    <label for="new-world-seed">Seed</label>
    <div class="seed-row">
      <input type="number" id="new-world-seed" placeholder="Random" min="0" max="2147483647" />
      <button class="btn" id="btn-randomize-seed" title="Randomize seed">🎲</button>
    </div>

    <div class="modal-footer">
      <button class="btn" id="btn-new-cancel">Cancel</button>
      <button class="btn primary" id="btn-new-create">Create</button>
    </div>
  </div>
</div>

<!-- ========================================================== -->
<!--  MODAL: Rename                                             -->
<!-- ========================================================== -->
<div class="modal-backdrop hidden" id="modal-rename">
  <div class="modal">
    <h2>✏ Rename World</h2>

    <label for="rename-input">New Name</label>
    <input type="text" id="rename-input" placeholder="New world name" maxlength="64" />

    <div class="modal-footer">
      <button class="btn" id="btn-rename-cancel">Cancel</button>
      <button class="btn primary" id="btn-rename-ok">Rename</button>
    </div>
  </div>
</div>

<!-- ========================================================== -->
<!--  MODAL: Settings                                           -->
<!-- ========================================================== -->
<div class="modal-backdrop hidden" id="modal-settings">
  <div class="modal" style="width:520px">
    <h2>⚙ World Settings</h2>

    <div class="settings-section">
      <h3>General</h3>
      <div class="setting-row">
        <label for="setting-view-dist">View Distance</label>
        <input type="range" id="setting-view-dist" min="100" max="2000" step="50" value="500" />
        <span id="setting-view-dist-val" style="width:40px;text-align:right;font-size:12px;color:#889">500</span>
      </div>
      <div class="setting-row">
        <label for="setting-shadows">Shadows</label>
        <input type="checkbox" id="setting-shadows" checked />
      </div>
      <div class="setting-row">
        <label for="setting-fog">Fog</label>
        <input type="checkbox" id="setting-fog" checked />
      </div>
    </div>

    <div class="settings-section">
      <h3>World</h3>
      <div class="setting-row">
        <label for="setting-difficulty">Difficulty</label>
        <select id="setting-difficulty" style="background:#1a1c2e;color:#ccd;border:1px solid rgba(255,255,255,0.15);border-radius:5px;padding:4px 8px;">
          <option value="peaceful">Peaceful</option>
          <option value="easy">Easy</option>
          <option value="normal" selected>Normal</option>
          <option value="hard">Hard</option>
        </select>
      </div>
      <div class="setting-row">
        <label for="setting-cheats">Allow Cheats</label>
        <input type="checkbox" id="setting-cheats" />
      </div>
    </div>

    <div class="settings-section">
      <h3>Add-ons</h3>
      <div id="addons-list"><p class="no-addons">No add-ons installed for this world.</p></div>
    </div>

    <div class="modal-footer">
      <button class="btn" id="btn-settings-cancel">Cancel</button>
      <button class="btn primary" id="btn-settings-save">Save</button>
    </div>
  </div>
</div>

<!-- ========================================================== -->
<!--  Hidden file input for import                              -->
<!-- ========================================================== -->
<input type="file" id="file-import-input" accept=".world,.json" />

<script src="worlds_menu.js"></script>
</body>
</html>
