<div id="generation-controls" style="position:fixed;top:12px;right:12px;z-index:9999;background:rgba(0,0,0,0.7);color:#e8f5ea;padding:10px;border:1px solid rgba(232,245,234,0.3);border-radius:6px;font:12px/1.3 Arial,sans-serif;max-width:330px;">
  <div style="font-weight:bold;margin-bottom:6px;">Generation Controls</div>
  <label style="display:flex;align-items:center;gap:6px;margin-bottom:6px;">
    <input id="streaming-toggle" type="checkbox" checked />
    Streaming enabled
  </label>
  <label style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
    Max concurrent jobs
    <input id="max-jobs" type="number" min="1" step="1" value="2" style="width:64px;" />
  </label>
  <label style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
    Pre-generate radius
    <input id="pregen-radius" type="number" min="0" step="1" value="2" style="width:64px;" />
    <button id="pregen-btn" type="button">Run</button>
  </label>

  <div style="font-weight:bold;margin-top:8px;">Loaded chunk keys</div>
  <pre id="loaded-chunks" style="margin:4px 0 8px;max-height:80px;overflow:auto;white-space:pre-wrap;">(none)</pre>

  <div style="font-weight:bold;">Generation statuses</div>
  <pre id="generation-statuses" style="margin:4px 0 0;max-height:120px;overflow:auto;">(none)</pre>
</div>
