<section id="simulation-panel" style="position:fixed;top:12px;left:12px;z-index:9999;background:rgba(0,0,0,0.72);color:#e8f5ea;padding:10px;border:1px solid rgba(232,245,234,0.3);border-radius:6px;font:12px/1.3 Arial,sans-serif;max-width:360px;">
  <div style="font-weight:bold;margin-bottom:6px;">Simulation</div>
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;">
    <button id="sim-play-pause-btn" type="button">Pause</button>
    <button id="sim-jump-morning-btn" type="button">Jump to morning</button>
    <button id="sim-jump-night-btn" type="button">Jump to night</button>
    <span>Time x<span id="sim-time-multiplier">50</span></span>
    <span id="sim-time-of-day">06:00</span>
  </div>
  <div id="sim-status" style="margin-bottom:8px;opacity:0.95;">Simulation running</div>
  <div style="font-weight:bold;">AI states</div>
  <pre id="sim-ai-states" style="margin:4px 0 0;max-height:120px;overflow:auto;white-space:pre-wrap;">(none)</pre>
</section>
