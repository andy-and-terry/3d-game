<section id="visuals-panel" aria-label="Visuals settings">
  <h3>Visuals</h3>

  <label for="visuals-preset">Preset</label>
  <select id="visuals-preset" name="visuals-preset">
    <option value="low">Low</option>
    <option value="medium" selected>Medium</option>
    <option value="high">High</option>
  </select>

  <div id="visuals-toggles">
    <label><input type="checkbox" id="toggle-shadows" checked /> Shadows</label>
    <label><input type="checkbox" id="toggle-ssao" checked /> SSAO</label>
    <label><input type="checkbox" id="toggle-ssr" /> SSR</label>
    <label><input type="checkbox" id="toggle-bloom" checked /> Bloom</label>
  </div>

  <div id="scene-toggles">
    <label><input type="checkbox" id="toggle-skybox" checked /> Skybox</label>
    <label><input type="checkbox" id="toggle-moon-light" checked /> Moon light</label>
  </div>
</section>
